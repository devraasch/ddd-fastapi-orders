services:
  api:
    build: .
    container_name: fastapi-ordering-api
    env_file:
      - .env
    # Bind mount: evita aviso de hardlink entre host e contentor; alinha o uv com o Python 3.12 da imagem
    environment:
      UV_LINK_MODE: copy
      UV_PYTHON: "3.12"
      # Sobre o .env: dentro da rede Docker o host tem de ser o nome do serviço, não 127.0.0.1
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - .:/app
      # venv do contentor: não passa no bind mount, evita .venv no host com dono root/nobody
      - api_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Sem --reload: o reload no Docker com volume montado costuma ser instável (WSL/Docker Desktop).
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 6s
      retries: 5
      start_period: 120s

  db:
    image: postgres:16-alpine
    container_name: fastapi-ordering-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fastapi-ordering-rabbitmq
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping", "-q"]
      interval: 3s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  rabbitmq_data:
  api_venv:
